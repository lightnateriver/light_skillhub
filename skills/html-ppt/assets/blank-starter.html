<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>演示标题</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
/* ── 全局变量（按需修改）── */
:root {
  --c-bg:      #0D0F14;
  --c-surface: #151820;
  --c-border:  rgba(255,255,255,0.08);
  --c-accent:  #4F8EF7;
  --c-accent2: #A78BFA;
  --c-text:    #F0F2F8;
  --c-muted:   rgba(240,242,248,0.45);
  --f-display: 'ZCOOL XiaoWei', serif;
  --f-body:    'Noto Sans SC', sans-serif;
  --f-serif:   'Noto Serif SC', serif;
}

/* ── 核心框架 ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background: var(--c-bg);
  font-family: var(--f-body);
  font-weight: 300;
  color: var(--c-text);
  scroll-snap-type: y mandatory;
  overflow-y: scroll;
  height: 100%;
}
.slide {
  width: 100vw;
  height: 56.25vw;
  position: relative;
  overflow: hidden;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  display: flex;
  flex-direction: column;
  background: var(--c-bg);
}
.slide-body {
  position: relative; z-index: 2;
  padding: 4% 6%;
  height: 100%;
  display: flex;
  flex-direction: column;
}
.slide-num {
  position:absolute; bottom:2.2%; right:3%;
  font-size:0.9vw; color:rgba(255,255,255,0.2);
  letter-spacing:0.15em; z-index:10;
}

/* ── 排版 ── */
.label     { font-size:0.85vw; letter-spacing:0.35em; text-transform:uppercase; color:var(--c-accent); font-weight:500; margin-bottom:1%; }
.title-xl  { font-family:var(--f-display); font-size:6.5vw; line-height:1.1; letter-spacing:0.04em; }
.title-lg  { font-family:var(--f-serif); font-size:3.8vw; line-height:1.25; font-weight:700; }
.title-md  { font-size:2.4vw; line-height:1.3; font-weight:700; }
.body-text { font-size:1.2vw; line-height:1.9; color:var(--c-muted); }
.divider   { width:5vw; height:2px; background:linear-gradient(90deg,var(--c-accent),transparent); margin:1.5% 0; }
.hl        { color:var(--c-accent); }
.hl-2      { color:var(--c-accent2); }

/* ── 卡片 ── */
.card { background:rgba(255,255,255,0.04); border:1px solid var(--c-border); border-radius:4px; padding:2% 2.5%; }

/* ── 导航 ── */
#nav-dots { position:fixed; right:1.5vw; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:8px; z-index:1000; }
.dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.25); cursor:pointer; transition:all 0.3s; border:none; padding:0; }
.dot.active { background:var(--c-accent); transform:scale(1.4); }
#nav-arrows { position:fixed; bottom:2.5vw; left:50%; transform:translateX(-50%); display:flex; gap:16px; z-index:1000; }
.arrow-btn { width:36px; height:36px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); backdrop-filter:blur(8px); color:rgba(255,255,255,0.6); cursor:pointer; font-size:14px; border-radius:50%; transition:all 0.2s; display:flex; align-items:center; justify-content:center; }
.arrow-btn:hover { background:rgba(79,142,247,0.2); border-color:var(--c-accent); color:var(--c-accent); }

/* ── 打印 ── */
@media print {
  html, body { height:auto; overflow:visible; scroll-snap-type:none; }
  #nav-dots, #nav-arrows { display:none !important; }
  .slide { width:297mm; height:167.0625mm; page-break-after:always; break-after:page; scroll-snap-align:none; }
}
</style>
</head>
<body>

<nav id="nav-dots"></nav>
<div id="nav-arrows">
  <button class="arrow-btn" id="btn-up">↑</button>
  <button class="arrow-btn" id="btn-dn">↓</button>
</div>

<!-- ★ 在此开始添加幻灯片 ★ -->

<section class="slide" id="slide-1">
  <div class="slide-body" style="justify-content:center;gap:1.5%;">
    <p class="label">标签 · 年份</p>
    <h1 class="title-xl">演示<span class="hl">标题</span></h1>
    <div class="divider"></div>
    <p class="body-text" style="max-width:40vw;">副标题或一句话描述。</p>
  </div>
  <span class="slide-num">01 / 01</span>
</section>

<!-- 复制上方 section 块以新增幻灯片 -->

<script>
const slides = Array.from(document.querySelectorAll('.slide'));
const dotsEl  = document.getElementById('nav-dots');
slides.forEach((_,i)=>{
  const b=document.createElement('button');
  b.className='dot'+(i===0?' active':'');
  b.title=`第${i+1}页`;
  b.addEventListener('click',()=>goTo(i));
  dotsEl.appendChild(b);
});
let cur=0;
const dots=()=>Array.from(dotsEl.querySelectorAll('.dot'));
function goTo(i){
  i=Math.max(0,Math.min(slides.length-1,i));
  slides[i].scrollIntoView({behavior:'smooth'});
  dots().forEach((d,j)=>d.classList.toggle('active',j===i));
  cur=i;
}
document.addEventListener('keydown',e=>{
  if(['ArrowDown','ArrowRight','PageDown'].includes(e.key)){e.preventDefault();goTo(cur+1);}
  if(['ArrowUp','ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();goTo(cur-1);}
});
document.getElementById('btn-up').onclick=()=>goTo(cur-1);
document.getElementById('btn-dn').onclick=()=>goTo(cur+1);
new IntersectionObserver(entries=>{
  entries.forEach(en=>{if(en.isIntersecting){cur=slides.indexOf(en.target);dots().forEach((d,i)=>d.classList.toggle('active',i===cur));}});
},{threshold:0.6}).observe; // placeholder
(()=>{const io=new IntersectionObserver(entries=>{entries.forEach(en=>{if(en.isIntersecting){cur=slides.indexOf(en.target);dots().forEach((d,i)=>d.classList.toggle('active',i===cur));}});},{threshold:0.6});slides.forEach(s=>io.observe(s));})();
</script>
</body>
</html>
